<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS话术生成系统 Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab:hover {
            background: rgba(255,255,255,0.1);
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group label .optional {
            color: #999;
            font-weight: normal;
            font-size: 0.85rem;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-wrapper label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .output-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px dashed #e0e0e0;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .output-header h3 {
            color: #333;
            font-size: 1.2rem;
        }

        .language-tabs {
            display: flex;
            gap: 8px;
        }

        .lang-tab {
            padding: 6px 14px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .lang-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .output-content {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
            font-size: 0.95rem;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .output-content:empty::before {
            content: "点击上方按钮生成话术...";
            color: #999;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-copy, .btn-download {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-copy:hover, .btn-download:hover {
            background: #667eea;
            color: white;
        }

        .btn-copy.copied {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🚀 RS话术生成系统 Pro</h1>
        <p>专业、高效、智能的话术生成工具</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('upgrade')">
                <span>🎉</span> 升级祝贺
            </button>
            <button class="tab" onclick="switchTab('invite')">
                <span>🤝</span> 邀请祝贺
            </button>
        </div>

        <!-- 升级祝贺 -->
        <div class="card" id="upgradeBox">
            <div class="form-group">
                <label>目标等级</label>
                <select id="rank">
                    <option value="R0">R0</option>
                    <option value="R1" selected>R1</option>
                    <option value="R2">R2</option>
                    <option value="R3">R3</option>
                    <option value="R4">R4</option>
                </select>
            </div>

            <div class="form-group">
                <label>活动奖励 (%) <span class="optional">- 可选</span></label>
                <input type="number" id="upActivity" placeholder="例如: 10" min="0" max="100">
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="upLucky">
                <label for="upLucky">✨ 包含幸运抽奖资格</label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="upCashCode">
                <label for="upCashCode">🎟 包含现金代码奖励</label>
            </div>

            <button class="btn-generate" onclick="genUpgrade()">
                ✨ 生成升级祝贺话术
            </button>

            <div class="output-section hidden" id="upOutputSection">
                <div class="output-header">
                    <h3>📋 生成结果</h3>
                    <div class="language-tabs">
                        <button class="lang-tab active" onclick="switchLang('up', 'zh')">中文</button>
                        <button class="lang-tab" onclick="switchLang('up', 'en')">English</button>
                        <button class="lang-tab" onclick="switchLang('up', 'ms')">Melayu</button>
                    </div>
                </div>

                <div class="stats-grid" id="upStats"></div>

                <div class="output-content" id="upResult"></div>

                <div class="action-buttons">
                    <button class="btn-copy" onclick="copyText('up')">
                        📋 复制内容
                    </button>
                    <button class="btn-download" onclick="downloadText('up')">
                        💾 下载文本
                    </button>
                </div>
            </div>
        </div>

        <!-- 邀请祝贺 -->
        <div class="card hidden" id="inviteBox">
            <div class="form-group">
                <label>邀请者等级</label>
                <select id="inviter">
                    <option value="R0">R0</option>
                    <option value="R1" selected>R1</option>
                    <option value="R2">R2</option>
                    <option value="R3">R3</option>
                    <option value="R4">R4</option>
                </select>
            </div>

            <div class="form-group">
                <label>新员工等级</label>
                <select id="newRank">
                    <option value="R0">R0</option>
                    <option value="R1" selected>R1</option>
                    <option value="R2">R2</option>
                    <option value="R3">R3</option>
                    <option value="R4">R4</option>
                </select>
            </div>

            <div class="form-group">
                <label>活动奖励 (%) <span class="optional">- 可选</span></label>
                <input type="number" id="inActivity" placeholder="例如: 10" min="0" max="100">
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="inLucky">
                <label for="inLucky">✨ 包含幸运抽奖资格</label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="inCashCode">
                <label for="inCashCode">🎟 包含现金代码奖励</label>
            </div>

            <button class="btn-generate" onclick="genInvite()">
                ✨ 生成邀请祝贺话术
            </button>

            <div class="output-section hidden" id="inOutputSection">
                <div class="output-header">
                    <h3>📋 生成结果</h3>
                    <div class="language-tabs">
                        <button class="lang-tab active" onclick="switchLang('in', 'zh')">中文</button>
                        <button class="lang-tab" onclick="switchLang('in', 'en')">English</button>
                        <button class="lang-tab" onclick="switchLang('in', 'ms')">Melayu</button>
                    </div>
                </div>

                <div class="stats-grid" id="inStats"></div>

                <div class="output-content" id="inResult"></div>

                <div class="action-buttons">
                    <button class="btn-copy" onclick="copyText('in')">
                        📋 复制内容
                    </button>
                    <button class="btn-download" onclick="downloadText('in')">
                        💾 下载文本
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const rankData = {
            R0: { deposit: 50, daily: 2, monthly: 60, yearly: 730 },
            R1: { deposit: 150, daily: 5, monthly: 150, yearly: 1825 },
            R2: { deposit: 450, daily: 15, monthly: 450, yearly: 5475 },
            R3: { deposit: 1350, daily: 45, monthly: 1350, yearly: 16425 },
            R4: { deposit: 4480, daily: 160, monthly: 4800, yearly: 58400 }
        };

        let textStore = {
            up: { zh: '', en: '', ms: '' },
            in: { zh: '', en: '', ms: '' }
        };

        let currentLang = {
            up: 'zh',
            in: 'zh'
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');
            document.getElementById('upgradeBox').classList.toggle('hidden', tab !== 'upgrade');
            document.getElementById('inviteBox').classList.toggle('hidden', tab !== 'invite');
        }

        function switchLang(type, lang) {
            currentLang[type] = lang;
            const section = type === 'up' ? 'upOutputSection' : 'inOutputSection';
            document.querySelectorAll(`#${section} .lang-tab`).forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            const resultDiv = type === 'up' ? 'upResult' : 'inResult';
            document.getElementById(resultDiv).textContent = textStore[type][lang];
        }

        function genUpgrade() {
            const rank = document.getElementById('rank').value;
            const activity = Number(document.getElementById('upActivity').value) || 0;
            const lucky = document.getElementById('upLucky').checked;
            const cashCode = document.getElementById('upCashCode').checked;
            const data = rankData[rank];
            const reward = (data.deposit * activity / 100).toFixed(2);

            let activityText = activity > 0 ? `🎉 活动奖励 *RM${reward}*已顺利存入您的 RS 账户，请注意查收～\n` : '';
            let luckyText = lucky ? `🏵 恭喜您已获得幸运抽奖资格，🎁 赢取高达 RM5,888 现金 + 📱 iPhone 17 Pro Max  请及时参与抽奖并分享获得的奖品～\n` : '';
            let cashCodeText = cashCode ? `💵 恭喜你成功获得现金代码奖励，已经发送至你的账户，请领取之后及时分享至RS工作组中。\n` : '';

            // 中文
            const zh = `🎉 恭喜您！您已成功晋升至 *${rank}* 等级！

📈 收入一览
━━━━━━━━━━━━━━━━━━━━
• 每个工作日收益：*RM${data.daily}*
• 30个工作日总收入：*RM${data.monthly}*
• 365个工作日总收入：*RM${data.yearly}*
✅ 我们已为您全面开启：
   • 更多合作伙伴邀请权限
   • 农场投资项目
${activityText}${luckyText}${cashCodeText}继续加油，我们一起把小溪变成大河！🚀`;

            // 英文（完整翻译）
            let activityTextEn = activity > 0 ? `🎉 Activity reward *RM${reward}* has been credited to your RS account, please check～\n` : '';
            let luckyTextEn = lucky ? `🏵 Congratulations on your lucky draw qualification! 🎁 Win up to RM5,888 cash + 📱 iPhone 17 Pro Max. Participate in time and share your prizes～\n` : '';
            let cashCodeTextEn = cashCode ? `💵 Congratulations on successfully obtaining the cash code reward. It has been sent to your account. Please claim it promptly and share it in the RS work group.\n` : '';

            const en = `🎉 Congratulations! You have successfully been promoted to *${rank}* level!

📈 Income Overview
━━━━━━━━━━━━━━━━━━━━
• Daily income: *RM${data.daily}*
• 30 working days total income: *RM${data.monthly}*
• 365 working days total income: *RM${data.yearly}*
✅ We have fully activated for you:
   • More partner invitation privileges
   • Farm investment projects
${activityTextEn}${luckyTextEn}${cashCodeTextEn}Keep going — let's turn small streams into a mighty river together! 🚀`;

            // 马来文（完整翻译）
            let activityTextMs = activity > 0 ? `🎉 Ganjaran aktiviti *RM${reward}* telah dikreditkan ke akaun RS anda, sila semak～\n` : '';
            let luckyTextMs = lucky ? `🏵 Tahniah kerana mendapat kelayakan cabutan bertuah! 🎁 Menang sehingga RM5,888 tunai + 📱 iPhone 17 Pro Max. Sertai segera dan kongsi ganjaran anda～\n` : '';
            let cashCodeTextMs = cashCode ? `💵 Tahniah kerana berjaya mendapat ganjaran kod tunai. Ia telah dihantar ke akaun anda. Sila tuntut segera dan kongsi dalam kumpulan kerja RS.\n` : '';

            const ms = `🎉 Tahniah! Anda telah berjaya dinaikkan ke tahap *${rank}*!

📈 Ringkasan Pendapatan
━━━━━━━━━━━━━━━━━━━━
• Pendapatan harian: *RM${data.daily}*
• Jumlah pendapatan 30 hari bekerja: *RM${data.monthly}*
• Jumlah pendapatan 365 hari bekerja: *RM${data.yearly}*
✅ Kami telah mengaktifkan sepenuhnya untuk anda:
   • Lebih banyak keistimewaan jemputan rakan kongsi
   • Projek pelaburan ladang
${activityTextMs}${luckyTextMs}${cashCodeTextMs}Teruskan usaha — mari kita ubah aliran kecil menjadi sungai yang besar! 🚀`;

            textStore.up = { zh, en, ms };

            document.getElementById('upStats').innerHTML = `
                <div class="stat-item"><div class="stat-value">RM${data.deposit}</div><div class="stat-label">存入金额</div></div>
                <div class="stat-item"><div class="stat-value">RM${data.daily}</div><div class="stat-label">日收益</div></div>
                <div class="stat-item"><div class="stat-value">RM${data.monthly}</div><div class="stat-label">月收益</div></div>
            `;

            document.getElementById('upOutputSection').classList.remove('hidden');
            document.getElementById('upResult').textContent = zh;
            document.getElementById('upOutputSection').scrollIntoView({ behavior: 'smooth' });
        }

        function genInvite() {
            const inviter = document.getElementById('inviter').value;
            const newRank = document.getElementById('newRank').value;
            const activity = Number(document.getElementById('inActivity').value) || 0;
            const lucky = document.getElementById('inLucky').checked;
            const cashCode = document.getElementById('inCashCode').checked;

            const newData = rankData[newRank];
            const invData = rankData[inviter];

            let referral = newData.deposit * 0.1;
            let passive = newData.daily * 0.03;

            const inviterLevel = parseInt(inviter.substring(1));
            const newLevel = parseInt(newRank.substring(1));

            if (inviterLevel < newLevel) {
                referral = invData.deposit * 0.1;
                passive = 0;
            }

            const monthlyPassive = passive * 30;
            const yearlyPassive = passive * 365;
            const reward = (newData.deposit * activity / 100).toFixed(2);

            // 中文
            let activityText = activity > 0 ? `🎉 活动奖励 *RM${reward}* 已顺利存入您的 RS 账户，请注意查收～\n` : '';
            let luckyText = lucky ? `🏵 恭喜您已获得幸运抽奖资格，🎁 赢取高达 RM5,888 现金 + 📱 iPhone 17 Pro Max  请及时参与抽奖并分享获得的奖品～\n` : '';
            let cashCodeText = cashCode ? `💵 恭喜你成功获得现金代码奖励，已经发送至你的账户，请领取之后及时分享至RS工作组中。\n` : '';

            const zh = `🎉 恭喜您！成功邀请 *${newRank}* 加入 RS 大家庭！

💰 邀请奖励详情
━━━━━━━━━━━━━━━━━━━━
🎁 您的奖励：
   • 基础推荐奖励：RM${referral.toFixed(2)}
   • 被动收入：RM${passive.toFixed(2)}/工作日
   • 预计月被动收入：RM${monthlyPassive.toFixed(2)}
   • 预计年被动收入：RM${yearlyPassive.toFixed(2)}
${activityText}${luckyText}${cashCodeText}未来您将持续享有下属每日 *3%* 的工作佣金！
感谢你的信任与支持，让我们一起创造更多财富！🚀`;

            // 英文（完整翻译）
            let activityTextEn = activity > 0 ? `🎉 Activity reward *RM${reward}* has been credited to your RS account, please check～\n` : '';
            let luckyTextEn = lucky ? `🏵 Congratulations on your lucky draw qualification! 🎁 Win up to RM5,888 cash + 📱 iPhone 17 Pro Max. Participate in time and share your prizes～\n` : '';
            let cashCodeTextEn = cashCode ? `💵 Congratulations on successfully obtaining the cash code reward. It has been sent to your account. Please claim it promptly and share it in the RS work group.\n` : '';

            const en = `🎉 Congratulations! You have successfully invited *${newRank}* to join the RS family!

💰 Invitation Reward Details
━━━━━━━━━━━━━━━━━━━━
🎁 Your rewards:
   • Basic referral bonus: RM${referral.toFixed(2)}
   • Passive income: RM${passive.toFixed(2)}/working day
   • Estimated monthly passive income: RM${monthlyPassive.toFixed(2)}
   • Estimated yearly passive income: RM${yearlyPassive.toFixed(2)}
${activityTextEn}${luckyTextEn}${cashCodeTextEn}You will continue to enjoy *3%* daily working commission from your subordinates!
Thank you for your trust and support. Let's create more wealth together! 🚀`;

            // 马来文（完整翻译）
            let activityTextMs = activity > 0 ? `🎉 Ganjaran aktiviti *RM${reward}* telah dikreditkan ke akaun RS anda, sila semak～\n` : '';
            let luckyTextMs = lucky ? `🏵 Tahniah kerana mendapat kelayakan cabutan bertuah! 🎁 Menang sehingga RM5,888 tunai + 📱 iPhone 17 Pro Max. Sertai segera dan kongsi ganjaran anda～\n` : '';
            let cashCodeTextMs = cashCode ? `💵 Tahniah kerana berjaya mendapat ganjaran kod tunai. Ia telah dihantar ke akaun anda. Sila tuntut segera dan kongsi dalam kumpulan kerja RS.\n` : '';

            const ms = `🎉 Tahniah! Anda berjaya menjemput *${newRank}* menyertai keluarga RS!

💰 Butiran Ganjaran Jemputan

        async function copyText(type) {
            const text = textStore[type][currentLang[type]];
            if (!text) {
                showToast('请先生成话术！', 'warning');
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ 已复制';
                btn.classList.add('copied');
                showToast('复制成功！');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                showToast('复制失败', 'error');
            }
        }

        function downloadText(type) {
            const text = textStore[type][currentLang[type]];
            if (!text) {
                showToast('请先生成话术！', 'warning');
                return;
            }
            const typeName = type === 'up' ? '升级祝贺' : '邀请祝贺';
            const langName = currentLang[type] === 'zh' ? '中文' : currentLang[type] === 'en' ? 'English' : 'Melayu';
            const filename = `RS话术_${typeName}_${langName}_${new Date().toLocaleDateString()}.txt`;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('下载成功！');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#dc3545' : type === 'warning' ? '#ffc107' : '#333';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
